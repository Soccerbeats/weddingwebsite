<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Collapse v2 — Bidirectional + Particles</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 28px 16px 48px;
    color: #fff;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; text-align: center; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; text-align: center; }

  /* ── Phone shell ── */
  .phone {
    width: 240px;
    height: 480px;
    background: #000;
    border-radius: 36px;
    border: 3px solid #333;
    position: relative;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    touch-action: none;
  }

  /* ── Strips ── */
  .strip { position: absolute; left: 0; right: 0; overflow: hidden; }

  #strip-top {
    top: 0; height: 33.333%;
    transform: translateY(-100%);
  }
  #strip-mid { top: 0; height: 100%; }
  #strip-bot {
    bottom: 0; height: 33.333%;
    transform: translateY(100%);
  }

  .fill { position: absolute; inset: 0; background-size: cover; background-position: center; }

  #strip-top .fill {
    background: linear-gradient(135deg, #3d1f0a 0%, #7a3d1a 40%, #c46a2a 100%);
    height: 300%; top: 0;
  }
  #strip-mid .fill {
    background: linear-gradient(160deg, #1a1a3a 0%, #2d4a6e 50%, #1a2a4a 100%);
    height: 100%;
  }
  #strip-bot .fill {
    background: linear-gradient(135deg, #0a1f0a 0%, #1a3d1a 40%, #2a6a2a 100%);
    height: 300%; bottom: 0; top: auto;
  }

  /* Hero text */
  .hero-text {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10; pointer-events: none;
  }
  .hero-text .name { font-family: Georgia, serif; font-size: 22px; color: #fff; letter-spacing: 3px; text-shadow: 0 2px 12px rgba(0,0,0,0.5); }
  .hero-text .amp  { font-family: Georgia, serif; font-size: 38px; color: #d4af37; line-height: 1.1; }
  .hero-text .date { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-top: 10px; }

  /* Dividers */
  .divider { position: absolute; left: 0; right: 0; height: 1px; background: rgba(212,175,55,0.5); z-index: 20; opacity: 0; }
  #div-top { top: 33.333%; }
  #div-bot { top: 66.666%; }

  /* Scroll hint */
  .scroll-hint {
    position: absolute; bottom: 20px; left: 0; right: 0;
    text-align: center; z-index: 15;
  }
  .scroll-hint-inner {
    display: inline-flex; flex-direction: column; align-items: center; gap: 4px;
    animation: hint-bounce 1.8s ease-in-out infinite;
  }
  .scroll-hint-inner span { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .scroll-hint-inner .arrow { font-size: 18px; color: rgba(255,255,255,0.4); }
  @keyframes hint-bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(5px); }
  }

  /* Expand hint (shown when collapsed) */
  .expand-hint {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 25; opacity: 0; pointer-events: none;
  }
  .expand-hint-inner {
    display: inline-flex; flex-direction: column; align-items: center; gap: 4px;
    animation: hint-bounce-up 1.8s ease-in-out infinite;
  }
  .expand-hint-inner span { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .expand-hint-inner .arrow { font-size: 18px; color: rgba(255,255,255,0.4); }
  @keyframes hint-bounce-up {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-5px); }
  }

  /* Strip labels */
  .strip-label {
    position: absolute; left: 12px; bottom: 8px;
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.6); z-index: 10; opacity: 0;
  }

  /* ── Particle canvas ── */
  #particle-canvas {
    position: absolute; inset: 0; z-index: 30; pointer-events: none;
  }

  /* ── Controls ── */
  .controls { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  button {
    padding: 10px 20px; border-radius: 999px; border: none;
    cursor: pointer; font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }
  #btn-collapse { background: #d4af37; color: #000; }
  #btn-expand   { background: #3a5f8a; color: #fff; opacity: 0.4; pointer-events: none; }
  #btn-reset    { background: #2a2a2a; color: #fff; border: 1px solid #444; }
  .hint-text    { margin-top: 14px; font-size: 12px; color: #555; text-align: center; line-height: 1.6; }

  .state-badge {
    margin-top: 12px;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: #d4af37; opacity: 0.7;
  }
</style>
</head>
<body>

<h1>Mobile Collapse — Bidirectional</h1>
<p class="subtitle">With particle burst on scroll down &amp; expand</p>

<div class="phone" id="phone">
  <canvas id="particle-canvas" width="240" height="480"></canvas>

  <div class="strip" id="strip-top">
    <div class="fill"></div>
    <div class="strip-label">Engaged · Napa 2024</div>
  </div>

  <div class="strip" id="strip-mid">
    <div class="fill"></div>
    <div class="hero-text" id="hero-text">
      <div class="name">SARAH</div>
      <div class="amp">&amp;</div>
      <div class="name">JAMES</div>
      <div class="date">June 14 · 2026</div>
    </div>
    <div class="scroll-hint" id="scroll-hint">
      <div class="scroll-hint-inner">
        <span>scroll</span>
        <span class="arrow">↓</span>
      </div>
    </div>
  </div>

  <div class="strip" id="strip-bot">
    <div class="fill"></div>
    <div class="strip-label">The Venue · Villa Rosa</div>
  </div>

  <div class="divider" id="div-top"></div>
  <div class="divider" id="div-bot"></div>

  <div class="expand-hint" id="expand-hint">
    <div class="expand-hint-inner">
      <span class="arrow">↑</span>
      <span>scroll up</span>
    </div>
  </div>
</div>

<div class="controls">
  <button id="btn-collapse" onclick="triggerCollapse()">Scroll Down ↓</button>
  <button id="btn-expand"   onclick="triggerExpand()">Scroll Up ↑</button>
  <button id="btn-reset"    onclick="hardReset()">↺ Reset</button>
</div>
<p class="hint-text">Swipe up on the phone to collapse · Swipe down to expand<br>Particles burst at the moment strips meet</p>
<div class="state-badge" id="state-badge">● FULL HERO</div>

<script>
  // ── DOM refs ──────────────────────────────────────────────────────────────
  const stripMid    = document.getElementById('strip-mid');
  const stripTop    = document.getElementById('strip-top');
  const stripBot    = document.getElementById('strip-bot');
  const heroText    = document.getElementById('hero-text');
  const scrollHint  = document.getElementById('scroll-hint');
  const expandHint  = document.getElementById('expand-hint');
  const divTop      = document.getElementById('div-top');
  const divBot      = document.getElementById('div-bot');
  const btnCollapse = document.getElementById('btn-collapse');
  const btnExpand   = document.getElementById('btn-expand');
  const badge       = document.getElementById('state-badge');
  const canvas      = document.getElementById('particle-canvas');
  const ctx         = canvas.getContext('2d');

  const DURATION = 900;
  let state     = 'full';   // 'full' | 'animating' | 'collapsed'
  let progress  = 0;        // 0 = full, 1 = collapsed
  let raf       = null;
  let particles = [];

  // ── Easing ────────────────────────────────────────────────────────────────
  function eio(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  }

  // ── Apply visual state ────────────────────────────────────────────────────
  function applyProgress(p) {
    const e = eio(p);

    // Middle: 0%/100% → 33.33%/33.33%
    stripMid.style.top    = (33.333 * e) + '%';
    stripMid.style.height = (100 - 66.666 * e) + '%';

    // Top strip: slides in from above with 0.15s delay
    const topP = eio(Math.max(0, Math.min(1, (p - 0.15) / 0.85)));
    stripTop.style.transform = `translateY(${-100 * (1 - topP)}%)`;

    // Bottom strip: slides in from below with 0.15s delay
    const botP = eio(Math.max(0, Math.min(1, (p - 0.15) / 0.85)));
    stripBot.style.transform = `translateY(${100 * (1 - botP)}%)`;

    // Hero text: fade + rise
    heroText.style.opacity   = Math.max(0, 1 - e * 3).toFixed(3);
    heroText.style.transform = `translateY(${-e * 30}px)`;

    // Scroll / expand hints
    scrollHint.style.opacity = Math.max(0, 1 - p * 5).toFixed(3);
    expandHint.style.opacity = state === 'collapsed' ? '1' : Math.max(0, (p - 0.9) * 10).toFixed(3);

    // Dividers
    const divAlpha = Math.max(0, (p - 0.85) / 0.15);
    divTop.style.opacity = divAlpha.toFixed(3);
    divBot.style.opacity = divAlpha.toFixed(3);

    // Strip labels
    const labelAlpha = Math.max(0, (p - 0.9) / 0.1);
    document.querySelectorAll('.strip-label').forEach(el => el.style.opacity = labelAlpha.toFixed(3));
  }

  // ── Particle system ───────────────────────────────────────────────────────
  // direction: 'collapse' (downward burst at strip seams) | 'expand' (outward burst)
  function spawnParticles(direction) {
    const W = 240, H = 480;
    const count = 36;
    for (let i = 0; i < count; i++) {
      // For collapse: particles spawn near the two seam lines (top 1/3 and 2/3 height)
      // For expand: particles spawn from center
      let x, y, vx, vy;
      if (direction === 'collapse') {
        const seam = Math.random() < 0.5 ? H * 0.333 : H * 0.667;
        x  = Math.random() * W;
        y  = seam + (Math.random() - 0.5) * 8;
        // Fan outward from the seam: slightly horizontal with mild vertical spread
        const angle = (Math.random() - 0.5) * Math.PI * 1.4;  // -70° to +70° from horizontal
        const speed = 1.2 + Math.random() * 2.4;
        vx = Math.cos(angle) * speed;
        vy = Math.sin(angle) * speed * 0.6;
      } else {
        // expand: burst outward from center of phone
        x  = W / 2 + (Math.random() - 0.5) * 40;
        y  = H / 2 + (Math.random() - 0.5) * 40;
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        vx = Math.cos(angle) * speed;
        vy = Math.sin(angle) * speed;
      }

      // Mix of gold sparks, white petals, and rose petals
      const type = Math.random();
      let color;
      if (type < 0.5)      color = `rgba(212,175,55,A)`;   // gold
      else if (type < 0.75) color = `rgba(255,255,255,A)`;  // white
      else                  color = `rgba(220,140,140,A)`;  // rose

      particles.push({
        x, y, vx, vy,
        size: 1.5 + Math.random() * 3,
        life: 1,
        decay: 0.012 + Math.random() * 0.018,
        color,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.15,
        isPetal: Math.random() < 0.35,
      });
    }
  }

  function tickParticles() {
    ctx.clearRect(0, 0, 240, 480);
    particles = particles.filter(p => p.life > 0);
    for (const p of particles) {
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += 0.04;         // gentle gravity
      p.vx  *= 0.98;         // air drag
      p.rot += p.rotV;
      p.life -= p.decay;

      const alpha = Math.max(0, p.life);
      const col   = p.color.replace('A', alpha.toFixed(2));

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);

      if (p.isPetal) {
        // Teardrop petal shape
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size * 0.6, p.size * 1.4, 0, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.fill();
      } else {
        // Spark / circle
        ctx.beginPath();
        ctx.arc(0, 0, p.size * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.fill();
      }
      ctx.restore();
    }
    if (particles.length > 0) requestAnimationFrame(tickParticles);
    else ctx.clearRect(0, 0, 240, 480);
  }

  let particleRAF = null;
  function fireParticles(direction) {
    spawnParticles(direction);
    if (particleRAF) cancelAnimationFrame(particleRAF);
    function loop() {
      ctx.clearRect(0, 0, 240, 480);
      particles = particles.filter(p => p.life > 0);
      for (const p of particles) {
        p.x   += p.vx;
        p.y   += p.vy;
        p.vy  += 0.045;
        p.vx  *= 0.978;
        p.rot += p.rotV;
        p.life -= p.decay;
        const alpha = Math.max(0, p.life);
        const col   = p.color.replace('A', alpha.toFixed(2));
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        if (p.isPetal) {
          ctx.beginPath();
          ctx.ellipse(0, 0, p.size * 0.6, p.size * 1.4, 0, 0, Math.PI * 2);
          ctx.fillStyle = col;
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.size * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = col;
          ctx.fill();
        }
        ctx.restore();
      }
      if (particles.length > 0) particleRAF = requestAnimationFrame(loop);
      else { ctx.clearRect(0, 0, 240, 480); particleRAF = null; }
    }
    particleRAF = requestAnimationFrame(loop);
  }

  // ── Animation runner ──────────────────────────────────────────────────────
  let particleFired = false;

  function runAnimation(target, onDone) {
    const from  = progress;
    const start = performance.now();
    particleFired = false;
    if (raf) cancelAnimationFrame(raf);

    function tick(now) {
      const t = Math.min(1, (now - start) / DURATION);
      progress = from + (target - from) * t;
      applyProgress(progress);

      // Fire particles when strips meet (~70% through animation)
      const fireAt = 0.7;
      if (!particleFired && Math.abs(progress - (target === 1 ? fireAt : 1 - fireAt)) < 0.08) {
        particleFired = true;
        fireParticles(target === 1 ? 'collapse' : 'expand');
      }

      if (t < 1) {
        raf = requestAnimationFrame(tick);
      } else {
        progress = target;
        applyProgress(target);
        onDone();
      }
    }
    raf = requestAnimationFrame(tick);
  }

  // ── Collapse / Expand ─────────────────────────────────────────────────────
  function triggerCollapse() {
    if (state !== 'full') return;
    state = 'animating';
    updateButtons();
    runAnimation(1, () => {
      state = 'collapsed';
      updateButtons();
      badge.textContent = '● COLLAPSED';
    });
  }

  function triggerExpand() {
    if (state !== 'collapsed') return;
    state = 'animating';
    updateButtons();
    runAnimation(0, () => {
      state = 'full';
      updateButtons();
      badge.textContent = '● FULL HERO';
    });
  }

  function updateButtons() {
    const isFull      = state === 'full';
    const isCollapsed = state === 'collapsed';
    btnCollapse.style.opacity       = isFull      ? '1' : '0.4';
    btnCollapse.style.pointerEvents = isFull      ? 'auto' : 'none';
    btnExpand.style.opacity         = isCollapsed ? '1' : '0.4';
    btnExpand.style.pointerEvents   = isCollapsed ? 'auto' : 'none';
    if (state === 'animating') badge.textContent = '● ANIMATING…';
  }

  function hardReset() {
    if (raf) cancelAnimationFrame(raf);
    particles = [];
    ctx.clearRect(0, 0, 240, 480);
    progress = 0;
    state    = 'full';
    applyProgress(0);
    divTop.style.opacity = '0';
    divBot.style.opacity = '0';
    badge.textContent    = '● FULL HERO';
    updateButtons();
  }

  // ── Touch / swipe on phone ────────────────────────────────────────────────
  let touchStartY = null;
  const phone = document.getElementById('phone');
  phone.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  phone.addEventListener('touchmove',  e => {
    if (touchStartY === null) return;
    const dy = touchStartY - e.touches[0].clientY;
    if (dy >  25 && state === 'full')      triggerCollapse();
    if (dy < -25 && state === 'collapsed') triggerExpand();
  }, { passive: true });
  phone.addEventListener('touchend', () => { touchStartY = null; }, { passive: true });

  // ── Init ──────────────────────────────────────────────────────────────────
  applyProgress(0);
  updateButtons();
</script>
</body>
</html>
